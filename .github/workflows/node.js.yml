name: Node.js CI

on:
  push:
    branches: [ "main", "backend-setup" ]
  pull_request:
    branches: [ "main", "backend-setup" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
      max-parallel: 1

    services:                        # ✅ MUST be here, under the job
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >                  # ✅ Use > or | for multiline strings
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5

    env:
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      MONGODB_URL_TEST: 'mongodb://localhost:27017/vteam7_test'
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Wait for MongoDB to be ready
        run: |
          for i in {1..30}; do
            mongo --eval "db.adminCommand('ping')" && break
            echo "Waiting for MongoDB..."
            sleep 2
          done
        env:
          PATH: /usr/bin:$PATH

      - name: Seed local test DB from Atlas
        run: |
          cd backend
          node scripts/copyDb.js
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}

      - name: Run Backend Tests
        run: |
          cd backend
          npm test
        env:
          MONGODB_URL_TEST: 'mongodb://localhost:27017/vteam7_test'
